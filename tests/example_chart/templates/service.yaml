apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-example
  labels:
    app.kubernetes.io/name: example
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      name: http
  selector:
    app.kubernetes.io/name: example
    app.kubernetes.io/instance: {{ .Release.Name }}
