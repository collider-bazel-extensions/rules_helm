apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-example
  labels:
    app.kubernetes.io/name: example
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: example
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: example
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: example
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: {{ .Values.service.port }}
              name: http
